site_name: "Descifrando la IA"
site_description: "Guía educativa sobre inteligencia artificial con perspectiva crítica y latinoamericana"
site_author: "Hijas de Internet"
site_url: "https://hijas-de-internet.github.io/descifrando-la-ia/"
repo_url: "https://github.com/Hijas-de-Internet/descifrando-la-ia"
repo_name: "Hijas-de-Internet/descifrando-la-ia"
edit_uri: "edit/main/docs/"

theme:
  name: material
  language: es
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Modo oscuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Modo claro
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.tabs.link
  icon:
    logo: material/creation

nav:
  - Inicio: index.md
  - "1. Qué es la IA": 01-que-es-la-ia.md
  - "Cómo hicimos esta wiki": como-se-hizo.md

markdown_extensions:
  - footnotes
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

plugins:
  - search

extra:
  analytics:
    provider: google
    property: G-FESH4DYEHH
  social:
    - icon: fontawesome/brands/instagram
      link: https://instagram.com/hijasdeinternet
      name: Hijas de Internet en Instagram
    - icon: fontawesome/brands/spotify
      link: https://open.spotify.com/show/hijasdeinternet
      name: Podcast en Spotify

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/external-links.js
  - javascripts/font-size.js
  - javascripts/quiz.js

copyright: "&copy; 2026 Hijas de Internet &bull; Descifrando la IA"
